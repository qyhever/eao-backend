name: Deploy to Server

on:
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SERVER_SSH_RSA: ${{ secrets.SERVER_SSH_RSA }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout deployment configuration
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SERVER_SSH_RSA }}

    - name: Add server to known hosts
      run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Build
      env:
        CGO_ENABLED: 0
        GOOS: linux
        GOARCH: amd64
      run: |
        mkdir -p public
        CURRENT_TIME=$(date '+%Y-%m-%d %H:%M:%S')
        echo "{\"deployTime\": \"$CURRENT_TIME\"}" > public/meta.json
        go build -o eao ./cmd/main.go

    - name: Upload files to server
      run: |
        rsync -avz --progress --partial ./eao $SERVER_USER@$SERVER_HOST:/opt/apps/eao-backend/
        rsync -avz --progress --partial ./public $SERVER_USER@$SERVER_HOST:/opt/apps/eao-backend/
        rsync -avz --progress --partial ./internal/config/app.yml $SERVER_USER@$SERVER_HOST:/opt/apps/eao-backend/

    - name: Restart service
      run: ssh $SERVER_USER@$SERVER_HOST "systemctl restart eao"

    - name: Check service status
      run: ssh $SERVER_USER@$SERVER_HOST "systemctl status eao"